<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Confirmation | MediSlot</title>
    <meta
      name="description"
      content="View your MediSlot appointment confirmation and booking details."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="confirmation">
    <div data-site-header></div>

    <main>
      <section class="page-hero">
        <div class="page-shell page-hero-layout">
          <div class="page-hero-card reveal">
            <p class="eyebrow">Confirmation</p>
            <h1>Your booking details are ready.</h1>
            <p class="lead">
              MediSlot displays the confirmed appointment after successful
              server-side booking.
            </p>
          </div>
          <aside class="page-hero-side reveal reveal-delay">
            <h3>Saved record</h3>
            <p class="contact-copy">
              The appointment remains available in the admin view and in the
              backend JSON file.
            </p>
          </aside>
        </div>
      </section>

      <section class="section">
        <div class="page-shell" id="confirmation-state"></div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="/static/app.js"></script>
    <script src="/static/confirmation.js"></script>
  </body>
</html>
